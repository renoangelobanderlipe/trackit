name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Frontend ──────────────────────────────────────────
  frontend-lint:
    name: Frontend Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Biome check
        run: pnpm lint

      - name: TypeScript typecheck
        run: cd apps/web && npx tsc --noEmit

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: frontend-lint
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build Next.js
        run: pnpm build

  # ── Backend ───────────────────────────────────────────
  backend-lint:
    name: Backend Lint (Pint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          extensions: bcmath, pdo_sqlite
          coverage: none

      - name: Install dependencies
        run: cd apps/server && composer install --no-interaction --prefer-dist

      - name: Run Pint
        run: cd apps/server && vendor/bin/pint --test

  backend-test:
    name: Backend Tests (Pest)
    runs-on: ubuntu-latest
    needs: backend-lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          extensions: bcmath, pdo_sqlite
          coverage: none

      - name: Install dependencies
        run: cd apps/server && composer install --no-interaction --prefer-dist

      - name: Prepare environment
        run: |
          cd apps/server
          cp .env.example .env
          sed -i 's/APP_ENV=production/APP_ENV=testing/' .env
          php artisan key:generate

      - name: Run tests
        run: cd apps/server && php artisan test --compact
