<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488"/>
      <stop offset="50%" style="stop-color:#0f766e"/>
      <stop offset="100%" style="stop-color:#115e59"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.15)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Subtle shine -->
  <rect width="512" height="512" rx="108" fill="url(#shine)"/>
  <!-- Decorative circle -->
  <circle cx="420" cy="80" r="100" fill="rgba(255,255,255,0.05)"/>
  <!-- Chart bars representing tracking -->
  <rect x="120" y="300" width="56" height="100" rx="12" fill="rgba(255,255,255,0.25)"/>
  <rect x="200" y="240" width="56" height="160" rx="12" fill="rgba(255,255,255,0.35)"/>
  <rect x="280" y="200" width="56" height="200" rx="12" fill="rgba(255,255,255,0.5)"/>
  <!-- Checkmark / completion line -->
  <path d="M130 220 L220 180 L310 150 L390 120" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Checkmark dot at end -->
  <circle cx="390" cy="120" r="16" fill="white"/>
  <circle cx="390" cy="120" r="8" fill="#0d9488"/>
  <!-- T letter subtle -->
  <text x="256" y="460" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="800" font-size="72" fill="rgba(255,255,255,0.9)" letter-spacing="-2">TrackIt</text>
</svg>
